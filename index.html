<!DOCTYPE html>
<html>
<head>
<title>Hacı OS</title>
<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
margin:0;
padding:0;
}
#terminal{
padding:20px;
white-space:pre-wrap;
}
input{
background:black;
color:#00ff00;
border:none;
outline:none;
font-family:monospace;
width:95%;
}
</style>
</head>
<body>

<div id="terminal">Hacı v1.0 başlatılıyor...
Type 'help' for commands
</div>
<input id="cmd" autofocus />

<script>
const term = document.getElementById('terminal');
const input = document.getElementById('cmd');

const commands = {
  help: "Available commands:\nabout - About me\nhelp - Show this help\nclear - Clear terminal",
  about: "Hacı  Portfolio\nYusuf Aglamaz - Developer\nContact: yusufaglamaz9904@gmail.com",
  clear: () => { term.textContent = ''; }
};

input.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    let cmd = input.value.toLowerCase();
    if(commands[cmd]){
      if(typeof commands[cmd] === 'function'){
        commands[cmd]();
      } else {
        term.textContent += "\n> " + cmd + "\n" + commands[cmd];
      }
    } else {
      term.textContent += "\n> " + cmd + "\nCommand not found";
    }
    input.value = '';
    term.scrollTop = term.scrollHeight;
  }
});
</script>

</body>
</html>
