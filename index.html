<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Hacı OS Terminal Portfolio</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

/* Kayan kodlar için canvas */
#matrix {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* Terminal */
#terminal {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 1;
  background: rgba(0,0,0,0.6);
  padding: 20px;
  border: 1px solid #00ff00;
  width: 600px;
  max-width: 90%;
  min-height: 150px;
}

#output {
  white-space: pre-wrap;
  margin-bottom: 10px;
}

input {
  background: black;
  color: #00ff00;
  border: none;
  outline: none;
  width: 100%;
  font-family: monospace;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="terminal">
  <div id="output">Hacı OS Terminal Portfolio Başlatıldı...</div>
  <input id="cmd" autofocus placeholder="Komut yaz: about / projects / contact" />
</div>

<script>
// ------------------- MATRIX KODLARI -------------------
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@$%&*+-";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];
for(let x = 0; x < columns; x++) drops[x] = Math.random()*canvas.height;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < drops.length; i++) {
    const text = letters.charAt(Math.floor(Math.random()*letters.length));
    ctx.fillText(text, i*fontSize, drops[i]);
    drops[i] += fontSize;
    if(drops[i] > canvas.height && Math.random() > 0.975) drops[i] = 0;
  }
}
setInterval(draw, 50);

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ------------------- TERMINAL -------------------
const output = document.getElementById("output");
const input = document.getElementById("cmd");

const commands = {
  about: "Hacı OS Portfolio\nDeveloper: Yusuf Aglamaz\nKısa Bilgi: Web & Terminal Portfolio",
  projects: "Projeler:\n- Terminal Portfolyo\n- Matrix Kodları\n- Diğer Web Projeleri",
  contact: "İletişim:\nyusufaglamaz9904@gmail.com"
};

input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    const cmd = input.value.toLowerCase();
    if(commands[cmd]){
      output.innerHTML += "\n> " + cmd + "\n" + commands[cmd];
    } else {
      output.innerHTML += "\n> " + cmd + "\nBilinmeyen komut";
    }
    input.value = "";
    output.scrollTop = output.scrollHeight;
  }
});
</script>

</body>
</html>
