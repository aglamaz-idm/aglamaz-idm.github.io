<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Terminal</title>
<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  overflow:hidden;
}

/* Matrix arka plan */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* Metin kutusu */
.content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  max-width:700px;
  width:90%;
  text-align:center;
  white-space:pre-line;
  font-size:16px;
  line-height:1.6;
  z-index:1;
  color:#ffffff;
  background: rgba(0,0,0,0.85);
  padding:25px;
  border-radius:12px;
  box-shadow: 0 0 20px rgba(0,255,156,0.2);
}

/* Terminal imleci */
.cursor{
  display:inline-block;
  margin-left:4px;
  animation:blink 1s steps(1,end) infinite;
}

@keyframes blink{
  0%, 50%, 100%{opacity:1;}
  25%, 75%{opacity:0;}
}

/* Mobil uyumluluk */
@media (max-width:600px){
  .content{
    font-size:14px;
    line-height:1.5;
  }
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="content">
  <span id="bio"></span><span class="cursor">|</span>
</div>

<script>
// Matrix arka plan
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill(1);

function drawMatrix(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff9c"; // Matrix kodları yeşil
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(drawMatrix,33);

// Beyaz tanıtım yazısı
const bioText = `Merhaba, ben Yusuf

Teknoloji ve yazılım dünyasında sürekli öğrenen bir geliştiriciyim.
Özellikle Python ve yapay zeka alanlarında kendimi geliştiriyor,
projeler üretiyorum. Amacım geleceğin yazılım sistemlerini
tasarlayabilecek ve geliştirebilecek seviyeye ulaşmak.

İlgi alanlarım arasında yazılım geliştirme, otomotiv teknolojileri
ve ileri mühendislik sistemleri yer alıyor. Her zaman öğrenmeye,
denemeye ve yenilikçi çözümler üretmeye odaklanıyorum.

Kısa vadede amacım kendi projelerimi hayata geçirmek ve
deneyim kazanmak; uzun vadede ise büyük teknoloji ve
savunma sanayisi projelerinde aktif rol almak.`;

const bio = document.getElementById("bio");
let i = 0;

function typeWriter(){
  if(i < bioText.length){
    bio.textContent += bioText.charAt(i);
    i++;
    setTimeout(typeWriter, 30);
  }
}
typeWriter();
</script>

</body>
</html>
